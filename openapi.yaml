openapi: 3.0.3
info:
  title: Accessibility Audit Platform API
  version: 0.1.0
  description: >
    Initial MVP API contract for the Accessibility Audit Platform.
    This specification defines the resource structure, core request and response
    schemas, and the main endpoints needed to configure audits, trigger report
    runs, and retrieve normalized accessibility findings.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Projects
  - name: Applications
  - name: Screens
  - name: Reports
  - name: ReportRuns
  - name: Findings
  - name: Guidelines
paths:
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
              examples:
                projectList:
                  $ref: '#/components/examples/ProjectListResponse'
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
            examples:
              happyPath:
                $ref: '#/components/examples/ProjectCreateRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                createdProject:
                  $ref: '#/components/examples/ProjectResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get a project by ID
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                project:
                  $ref: '#/components/examples/ProjectResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Projects]
      operationId: updateProject
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
            examples:
              renameProject:
                $ref: '#/components/examples/ProjectUpdateRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                updatedProject:
                  $ref: '#/components/examples/ProjectUpdatedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{projectId}/applications:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Applications]
      operationId: listApplicationsByProject
      summary: List applications for a project
      responses:
        '200':
          description: Applications retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
              examples:
                applicationList:
                  $ref: '#/components/examples/ApplicationListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Applications]
      operationId: createApplication
      summary: Create an application inside a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
            examples:
              happyPath:
                $ref: '#/components/examples/ApplicationCreateRequest'
      responses:
        '201':
          description: Application created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                createdApplication:
                  $ref: '#/components/examples/ApplicationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /applications/{applicationId}:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Applications]
      operationId: getApplication
      summary: Get an application by ID
      responses:
        '200':
          description: Application retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                application:
                  $ref: '#/components/examples/ApplicationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Applications]
      operationId: updateApplication
      summary: Update an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdateRequest'
            examples:
              adjustViewport:
                $ref: '#/components/examples/ApplicationUpdateRequest'
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                updatedApplication:
                  $ref: '#/components/examples/ApplicationUpdatedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /applications/{applicationId}/screens:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Screens]
      operationId: listScreensByApplication
      summary: List screens for an application
      responses:
        '200':
          description: Screens retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenListResponse'
              examples:
                screenList:
                  $ref: '#/components/examples/ScreenListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Screens]
      operationId: createScreen
      summary: Create a screen inside an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenCreateRequest'
            examples:
              happyPath:
                $ref: '#/components/examples/ScreenCreateRequest'
      responses:
        '201':
          description: Screen created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenResponse'
              examples:
                createdScreen:
                  $ref: '#/components/examples/ScreenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /screens/{screenId}:
    parameters:
      - $ref: '#/components/parameters/ScreenId'
    get:
      tags: [Screens]
      operationId: getScreen
      summary: Get a screen by ID
      responses:
        '200':
          description: Screen retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenResponse'
              examples:
                screen:
                  $ref: '#/components/examples/ScreenResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Screens]
      operationId: updateScreen
      summary: Update a screen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenUpdateRequest'
            examples:
              renameScreen:
                $ref: '#/components/examples/ScreenUpdateRequest'
      responses:
        '200':
          description: Screen updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenResponse'
              examples:
                updatedScreen:
                  $ref: '#/components/examples/ScreenUpdatedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /applications/{applicationId}/reports:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Reports]
      operationId: listReportsByApplication
      summary: List reports for an application
      responses:
        '200':
          description: Reports retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
              examples:
                reportList:
                  $ref: '#/components/examples/ReportListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Reports]
      operationId: createReport
      summary: Create a report inside an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreateRequest'
            examples:
              happyPath:
                $ref: '#/components/examples/ReportCreateRequest'
      responses:
        '201':
          description: Report created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
              examples:
                createdReport:
                  $ref: '#/components/examples/ReportResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /reports/{reportId}:
