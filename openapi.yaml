openapi: 3.0.3
info:
  title: Accessibility Audit Platform API
  version: 0.1.0
  description: >
    Initial MVP API contract for the Accessibility Audit Platform.
    This specification defines the resource structure, core request and response
    schemas, and the main endpoints needed to configure audits, trigger report
    runs, and retrieve normalized accessibility findings.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Operational
  - name: Projects
  - name: Applications
  - name: Reports
  - name: ReportRuns
  - name: Findings
  - name: Guidelines
paths:
  /health:
    get:
      tags: [Operational]
      operationId: getHealth
      summary: Get API health
      description: Returns a lightweight liveness response for infrastructure and uptime checks.
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                health:
                  $ref: '#/components/examples/HealthResponse'
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
              examples:
                projects:
                  $ref: '#/components/examples/ProjectListResponse'
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
            examples:
              createProject:
                $ref: '#/components/examples/ProjectCreateRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                createdProject:
                  $ref: '#/components/examples/ProjectResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidProject:
                  $ref: '#/components/examples/ProjectCreateValidationError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                projectStoreUnavailable:
                  $ref: '#/components/examples/ProjectPersistenceError'
  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get a project by ID
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                project:
                  $ref: '#/components/examples/ProjectResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                projectNotFound:
                  $ref: '#/components/examples/ProjectNotFoundError'
    patch:
      tags: [Projects]
      operationId: updateProject
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
            examples:
              renameProjectForRelease:
                $ref: '#/components/examples/ProjectUpdateRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                updatedProject:
                  $ref: '#/components/examples/ProjectUpdatedResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidProjectUpdate:
                  $ref: '#/components/examples/ProjectUpdateValidationError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                projectNotFound:
                  $ref: '#/components/examples/ProjectNotFoundError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                projectStoreUnavailable:
                  $ref: '#/components/examples/ProjectPersistenceError'

  /projects/{projectId}/applications:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Applications]
      operationId: listApplicationsByProject
      summary: List applications for a project
      description: Returns the audited applications configured under a single customer project.
      responses:
        '200':
          description: Applications retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
              examples:
                applications:
                  $ref: '#/components/examples/ApplicationListResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                projectNotFound:
                  $ref: '#/components/examples/ProjectNotFoundError'
    post:
      tags: [Applications]
      operationId: createApplication
      summary: Create an application inside a project
      description: Stores audit execution defaults such as device, viewport, wait time, and WCAG target. The request may also include the application's initial screen collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
            examples:
              storefrontDesktop:
                $ref: '#/components/examples/ApplicationCreateRequest'
      responses:
        '201':
          description: Application created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                createdApplication:
                  $ref: '#/components/examples/ApplicationResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidApplication:
                  $ref: '#/components/examples/ApplicationCreateValidationError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                projectNotFound:
                  $ref: '#/components/examples/ProjectNotFoundError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                applicationStoreUnavailable:
                  $ref: '#/components/examples/ApplicationPersistenceError'

  /applications/{applicationId}:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Applications]
      operationId: getApplication
      summary: Get an application by ID
      description: Retrieves application configuration and may include the current screen collection managed under that application.
      responses:
        '200':
          description: Application retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                application:
                  $ref: '#/components/examples/ApplicationResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                applicationNotFound:
                  $ref: '#/components/examples/ApplicationNotFoundError'
    patch:
      tags: [Applications]
      operationId: updateApplication
      summary: Update an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdateRequest'
            examples:
              tuneViewportAndWait:
                $ref: '#/components/examples/ApplicationUpdateRequest'
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                updatedApplication:
                  $ref: '#/components/examples/ApplicationUpdatedResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidApplicationUpdate:
                  $ref: '#/components/examples/ApplicationUpdateValidationError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                applicationNotFound:
                  $ref: '#/components/examples/ApplicationNotFoundError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                applicationStoreUnavailable:
                  $ref: '#/components/examples/ApplicationPersistenceError'

  /applications/{applicationId}/screens:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    put:
      tags: [Applications]
      operationId: replaceApplicationScreens
      summary: Replace the screen collection for an application
      description: Replaces the current application-owned screen collection with the provided list. This is the explicit MVP endpoint for managing screens under the application context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationScreensReplaceRequest'
            examples:
              replaceApplicationScreens:
                $ref: '#/components/examples/ApplicationScreensReplaceRequest'
      responses:
        '200':
          description: Application screens replaced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenListResponse'
              examples:
                screens:
                  $ref: '#/components/examples/ScreenListResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidScreens:
                  $ref: '#/components/examples/ApplicationScreensValidationError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                applicationNotFound:
                  $ref: '#/components/examples/ApplicationNotFoundError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                screenStoreUnavailable:
                  $ref: '#/components/examples/ApplicationScreensPersistenceError'

  /applications/{applicationId}/reports:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Reports]
      operationId: listReportsByApplication
      summary: List reports for an application
      description: Returns reusable audit definitions. Reports store configuration only and do not represent execution history.
      responses:
        '200':
          description: Reports retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
              examples:
                reports:
                  $ref: '#/components/examples/ReportListResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                applicationNotFound:
                  $ref: '#/components/examples/ApplicationNotFoundError'
    post:
      tags: [Reports]
      operationId: createReport
      summary: Create a report inside an application
      description: Creates a reusable audit configuration. No audit is executed until a report run is triggered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreateRequest'
            examples:
              publicPurchaseFlow:
                $ref: '#/components/examples/ReportCreateRequest'
              authenticatedPortalAudit:
                $ref: '#/components/examples/ReportCreateRequestWithAuthentication'
      responses:
        '201':
          description: Report created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
              examples:
                createdReport:
                  $ref: '#/components/examples/ReportResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidReport:
                  $ref: '#/components/examples/ReportCreateValidationError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                applicationNotFound:
                  $ref: '#/components/examples/ApplicationNotFoundError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportStoreUnavailable:
                  $ref: '#/components/examples/ReportPersistenceError'

  /reports/{reportId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Reports]
      operationId: getReport
      summary: Get a report by ID
      responses:
        '200':
          description: Report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
              examples:
                report:
                  $ref: '#/components/examples/ReportResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportNotFound:
                  $ref: '#/components/examples/ReportNotFoundError'
    patch:
      tags: [Reports]
      operationId: updateReport
      summary: Update a report
      description: Use to rename a report, change screen selection, or add optional authentication for protected environments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportUpdateRequest'
            examples:
              enableAuthentication:
                $ref: '#/components/examples/ReportUpdateRequest'
      responses:
        '200':
          description: Report updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
              examples:
                updatedReport:
                  $ref: '#/components/examples/ReportUpdatedResponse'
        '400':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidReportUpdate:
                  $ref: '#/components/examples/ReportUpdateValidationError'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportNotFound:
                  $ref: '#/components/examples/ReportNotFoundError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportStoreUnavailable:
                  $ref: '#/components/examples/ReportPersistenceError'

  /reports/{reportId}/report-runs:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [ReportRuns]
      operationId: listReportRunsByReport
      summary: List report runs for a report
      description: Returns execution history for one report, including in-progress runs and terminal results.
      responses:
        '200':
          description: Report runs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRunListResponse'
              examples:
                reportRuns:
                  $ref: '#/components/examples/ReportRunListResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportNotFound:
                  $ref: '#/components/examples/ReportNotFoundError'
    post:
      tags: [ReportRuns]
      operationId: createReportRun
      summary: Trigger a new report run
      description: Creates a new execution instance for the specified report. The initial status is `pending` and execution progresses asynchronously through the report-run lifecycle.
      responses:
        '201':
          description: Report run created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRunResponse'
              examples:
                createdRun:
                  $ref: '#/components/examples/ReportRunPendingResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportNotFound:
                  $ref: '#/components/examples/ReportNotFoundError'
        '500':
          description: Request failed due to an execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                auditEngineUnavailable:
                  $ref: '#/components/examples/ReportRunExecutionError'

  /report-runs/{reportRunId}:
    parameters:
      - $ref: '#/components/parameters/ReportRunId'
    get:
      tags: [ReportRuns]
      operationId: getReportRun
      summary: Get a report run by ID
      description: Retrieves the current execution status and summary metadata for a single report run.
      responses:
        '200':
          description: Report run retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRunResponse'
              examples:
                runningRun:
                  $ref: '#/components/examples/ReportRunRunningResponse'
                completedRun:
                  $ref: '#/components/examples/ReportRunCompletedResponse'
                failedRun:
                  $ref: '#/components/examples/ReportRunFailedResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportRunNotFound:
                  $ref: '#/components/examples/ReportRunNotFoundError'

  /report-runs/{reportRunId}/findings:
    parameters:
      - $ref: '#/components/parameters/ReportRunId'
    get:
      tags: [Findings]
      operationId: listFindingsByReportRun
      summary: List findings for a report run
      description: Returns normalized findings for the run. Raw axe-core payloads are intentionally not exposed by the public API.
      responses:
        '200':
          description: Findings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingListResponse'
              examples:
                findings:
                  $ref: '#/components/examples/FindingListResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                reportRunNotFound:
                  $ref: '#/components/examples/ReportRunNotFoundError'

  /findings/{findingId}:
    parameters:
      - $ref: '#/components/parameters/FindingId'
    get:
      tags: [Findings]
      operationId: getFinding
      summary: Get a finding by ID
      responses:
        '200':
          description: Finding retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingResponse'
              examples:
                finding:
                  $ref: '#/components/examples/FindingResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                findingNotFound:
                  $ref: '#/components/examples/FindingNotFoundError'

  /guidelines:
    get:
      tags: [Guidelines]
      operationId: listGuidelines
      summary: List guidelines
      responses:
        '200':
          description: Guidelines retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuidelineListResponse'
              examples:
                guidelineList:
                  $ref: '#/components/examples/GuidelineListResponse'

  /guidelines/{guidelineId}:
    parameters:
      - $ref: '#/components/parameters/GuidelineId'
    get:
      tags: [Guidelines]
      operationId: getGuideline
      summary: Get a guideline by ID
      responses:
        '200':
          description: Guideline retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuidelineResponse'
              examples:
                guideline:
                  $ref: '#/components/examples/GuidelineResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionErrorResponse'
              examples:
                guidelineNotFound:
                  $ref: '#/components/examples/GuidelineNotFoundError'
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportRunId:
      name: reportRunId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FindingId:
      name: findingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GuidelineId:
      name: guidelineId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExecutionErrorResponse'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    InternalServerError:
      description: Request failed due to an execution error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExecutionErrorResponse'
  examples:
    HealthResponse:
      summary: Health response
      value:
        status: ok
    ProjectCreateRequest:
      summary: Create project request
      value:
        name: Acme Storefront Accessibility Baseline
        customerName: Acme Retail
    ProjectUpdateRequest:
      summary: Update project request
      value:
        name: Acme Storefront Accessibility Baseline - Spring Release
    ProjectResponse:
      summary: Project response
      value:
        data:
          id: 7ed95d96-7f5a-4c91-a7f8-2b1e63d2d9cc
          name: Acme Storefront Accessibility Baseline
          customerName: Acme Retail
          createdAt: '2026-04-02T10:00:00Z'
          updatedAt: '2026-04-02T10:00:00Z'
    ProjectUpdatedResponse:
      summary: Updated project response
      value:
        data:
          id: 7ed95d96-7f5a-4c91-a7f8-2b1e63d2d9cc
          name: Acme Storefront Accessibility Baseline - Spring Release
          customerName: Acme Retail
          createdAt: '2026-04-02T10:00:00Z'
          updatedAt: '2026-04-03T08:45:00Z'
    ProjectListResponse:
      summary: Project list response
      value:
        data:
          - id: 7ed95d96-7f5a-4c91-a7f8-2b1e63d2d9cc
            name: Acme Storefront Accessibility Baseline
