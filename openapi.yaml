    ApplicationScreensReplaceRequest:
      summary: Replace application screens request
      value:
        screens:
          - id: ffefdc94-7fb9-4cb2-bf1f-553499f6cf4f
            name: Home
            url: https://shop.acme.test/
          - id: 8246317d-6758-4f6a-9957-695ed30a9e13
