        '500':
          $ref: '#/components/responses/InternalServerError'

  /reports/{reportId}/report-runs:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [ReportRuns]
      operationId: listReportRunsByReport
      summary: List report runs for a report
      responses:
        '200':
          description: Report runs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRunListResponse'
              examples:
                runList:
                  $ref: '#/components/examples/ReportRunListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ReportRuns]
      operationId: createReportRun
      summary: Trigger a new report run
      description: Creates a new execution instance for the specified report.
      responses:
        '201':
          description: Report run created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRunResponse'
              examples:
                createdRun:
                  $ref: '#/components/examples/ReportRunPendingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /report-runs/{reportRunId}:
    parameters:
      - $ref: '#/components/parameters/ReportRunId'
    get:
      tags: [ReportRuns]
      operationId: getReportRun
      summary: Get a report run by ID
      description: Retrieves the current execution status and summary metadata for a single report run.
      responses:
        '200':
          description: Report run retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRunResponse'
              examples:
                completedRun:
                  $ref: '#/components/examples/ReportRunCompletedResponse'
                failedRun:
                  $ref: '#/components/examples/ReportRunFailedResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /report-runs/{reportRunId}/findings:
    parameters:
      - $ref: '#/components/parameters/ReportRunId'
    get:
      tags: [Findings]
      operationId: listFindingsByReportRun
      summary: List findings for a report run
      responses:
        '200':
          description: Findings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingListResponse'
              examples:
                findingList:
                  $ref: '#/components/examples/FindingListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /findings/{findingId}:
    parameters:
      - $ref: '#/components/parameters/FindingId'
    get:
      tags: [Findings]
      operationId: getFinding
      summary: Get a finding by ID
      responses:
        '200':
          description: Finding retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingResponse'
              examples:
                finding:
                  $ref: '#/components/examples/FindingResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /guidelines:
    get:
      tags: [Guidelines]
      operationId: listGuidelines
      summary: List guidelines
      responses:
        '200':
          description: Guidelines retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuidelineListResponse'
              examples:
                guidelineList:
                  $ref: '#/components/examples/GuidelineListResponse'

  /guidelines/{guidelineId}:
    parameters:
      - $ref: '#/components/parameters/GuidelineId'
    get:
      tags: [Guidelines]
      operationId: getGuideline
      summary: Get a guideline by ID
      responses:
        '200':
          description: Guideline retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuidelineResponse'
              examples:
                guideline:
                  $ref: '#/components/examples/GuidelineResponse'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScreenId:
      name: screenId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportRunId:
      name: reportRunId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FindingId:
      name: findingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GuidelineId:
      name: guidelineId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExecutionErrorResponse'
          examples:
            resourceNotFound:
              $ref: '#/components/examples/ResourceNotFoundError'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          examples:
            invalidRequest:
              $ref: '#/components/examples/ValidationError'
    InternalServerError:
      description: Request failed due to an execution error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExecutionErrorResponse'
          examples:
            executionFailure:
              $ref: '#/components/examples/InternalServerError'
  examples:
