                report:
                  $ref: '#/components/examples/ReportResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reports]
      operationId: updateReport
      summary: Update a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportUpdateRequest'
            examples:
              disableAuthentication:
                $ref: '#/components/examples/ReportUpdateRequest'
      responses:
        '200':
          description: Report updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
              examples:
                updatedReport:
                  $ref: '#/components/examples/ReportUpdatedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
