  schemas:
    ErrorKind:
      type: string
      description: Distinguishes validation failures from execution/runtime failures.
      enum:
        - validation_error
        - execution_error
    ErrorEnvelope:
      type: object
      description: Standard error envelope returned by the API for any non-success response.
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/BaseError'
    BaseError:
      type: object
      required:
        - type
        - code
        - message
      properties:
        type:
          $ref: '#/components/schemas/ErrorKind'
        code:
          type: string
          description: Stable machine-readable error code for client-side branching.
        message:
          type: string
          description: Human-readable explanation suitable for logs or UI surfaces.
    ValidationErrorDetail:
      type: object
      required:
        - field
        - issue
      properties:
        field:
          type: string
          description: Request field or path that failed validation.
        issue:
          type: string
          description: Validation rule that was violated.
    ValidationError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            type:
              type: string
              enum:
                - validation_error
            details:
              type: array
              description: Field-level validation issues for the request payload or parameters.
              items:
                $ref: '#/components/schemas/ValidationErrorDetail'
          required:
            - details
    ExecutionError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            type:
              type: string
              enum:
                - execution_error
    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
            error:
              $ref: '#/components/schemas/ValidationError'
    ExecutionErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
            error:
              $ref: '#/components/schemas/ExecutionError'
