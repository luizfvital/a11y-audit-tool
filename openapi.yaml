    ApplicationUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        device:
          $ref: '#/components/schemas/Device'
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
        waitTimeMs:
          type: integer
          minimum: 0
        accessibilityTarget:
          $ref: '#/components/schemas/AccessibilityTarget'
        screens:
          type: array
          items:
            $ref: '#/components/schemas/ScreenWrite'
    ApplicationScreensReplaceRequest:
      type: object
      required:
        - screens
      properties:
        screens:
          type: array
          items:
            $ref: '#/components/schemas/ScreenWrite'
    ApplicationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Application'
    ApplicationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Application'

    Screen:
      type: object
      required:
        - id
        - applicationId
        - name
        - url
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        applicationId:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ScreenWrite:
      type: object
      required:
        - name
        - url
      properties:
        id:
          type: string
          format: uuid
          description: Optional existing screen identifier when replacing the collection.
        name:
          type: string
        url:
          type: string
          format: uri
    ScreenCreateRequest:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
    ScreenUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
    ScreenResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Screen'
    ScreenListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Screen'

    Report:
      type: object
      required:
        - id
        - applicationId
        - name
        - authenticationEnabled
        - selectedScreenIds
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        applicationId:
          type: string
          format: uuid
        name:
          type: string
        authenticationEnabled:
          type: boolean
        authentication:
          $ref: '#/components/schemas/AuthenticationConfig'
        selectedScreenIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReportCreateRequest:
      type: object
      required:
        - name
        - authenticationEnabled
        - selectedScreenIds
      properties:
        name:
          type: string
        authenticationEnabled:
          type: boolean
        authentication:
          $ref: '#/components/schemas/AuthenticationConfig'
        selectedScreenIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
    ReportUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        authenticationEnabled:
          type: boolean
        authentication:
          $ref: '#/components/schemas/AuthenticationConfig'
        selectedScreenIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
    ReportResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Report'
    ReportListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Report'

    ReportRun:
      type: object
      description: Execution status resource for a single run of a report.
      required:
        - id
        - reportId
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        reportId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ReportRunStatus'
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when backend execution actually started.
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the run reached a terminal state.
        errorMessage:
          type: string
          nullable: true
          description: High-level failure reason when the run ends in `failed`.
        summary:
          $ref: '#/components/schemas/ReportRunSummary'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReportRunSummary:
      type: object
      description: Summary metadata associated with the current run state.
      properties:
        totalFindings:
          type: integer
          minimum: 0
          description: Number of findings persisted for this run so far.
        screensScanned:
          type: integer
          minimum: 0
          description: Number of screens processed so far.
        screensPlanned:
          type: integer
          minimum: 0
          description: Total number of screens selected for the run.
        findingsByImpact:
          type: object
          description: Breakdown of findings by normalized impact level.
          additionalProperties:
            type: integer
            minimum: 0
    ReportRunResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ReportRun'
    ReportRunListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReportRun'

    Finding:
      type: object
      description: Normalized accessibility issue produced by a specific report run.
      required:
        - id
        - reportRunId
        - screenId
        - guidelineId
        - ruleCode
        - message
        - selector
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        reportRunId:
          type: string
          format: uuid
        screenId:
          type: string
          format: uuid
        guidelineId:
          type: string
          format: uuid
        ruleCode:
          type: string
          description: Stable scanner rule identifier retained in the normalized finding.
        message:
          type: string
          description: Human-readable explanation of the accessibility issue.
        selector:
          type: string
          description: CSS selector path for the element instance reported by the scanner.
        htmlSnippet:
          type: string
          nullable: true
          description: Short HTML snippet captured for the offending element when available.
        impact:
          $ref: '#/components/schemas/FindingImpact'
        createdAt:
          type: string
          format: date-time
    FindingResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Finding'
    FindingListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Finding'

    Guideline:
      type: object
      required:
        - id
        - code
        - name
        - level
        - standard
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        level:
          type: string
        standard:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GuidelineResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Guideline'
    GuidelineListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Guideline'

    AuthenticationConfig:
      type: object
      properties:
        loginUrl:
          type: string
          format: uri
        username:
          type: string
        password:
          type: string
          writeOnly: true

    Device:
      type: string
      enum:
        - desktop
        - tablet
        - phone
    AccessibilityStandard:
      type: string
      enum:
        - WCAG
    WcagVersion:
      type: string
      enum:
        - '2.0'
        - '2.1'
        - '2.2'
    WcagLevel:
      type: string
      enum:
        - A
        - AA
        - AAA
    AccessibilityTarget:
      type: object
      required:
        - standard
        - version
        - levels
      properties:
        standard:
          $ref: '#/components/schemas/AccessibilityStandard'
        version:
          $ref: '#/components/schemas/WcagVersion'
        levels:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/WcagLevel'
    ReportRunStatus:
      type: string
      enum:
        - pending
        - running
        - completed
        - failed
    FindingImpact:
      type: string
      enum:
        - minor
        - moderate
        - serious
        - critical
      nullable: true
