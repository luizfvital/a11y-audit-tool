              updatedAt: '2026-04-02T10:15:00Z'
          createdAt: '2026-04-02T10:05:00Z'
          updatedAt: '2026-04-02T10:05:00Z'
    ApplicationUpdatedResponse:
      summary: Updated application response
      value:
        data:
          id: 48d52f4f-37da-4786-8b79-172d4f2d358b
          projectId: 7ed95d96-7f5a-4c91-a7f8-2b1e63d2d9cc
          name: Acme Storefront
          device: desktop
